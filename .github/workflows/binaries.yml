name: Build binaries

# Releases are driven by pushing a tag (e.g. `git push origin v0.7.0`), not by
# publishing a release in the UI. GitHub immutable releases freeze a release's
# assets the moment it is published, so the assets must be attached while the
# release is still a draft. This workflow builds the archives, creates a draft
# release with them attached, then flips the release to published.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archives
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: make dist

      - name: Verify Linux archive
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: |
          tar -tzf "dist/cinc-zero_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "dist/cinc-zero_${VERSION}_linux_amd64.tar.gz" -C /tmp
          "/tmp/cinc-zero_${VERSION}_linux_amd64/cinc-zero" version

      - name: Publish GitHub release assets
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Attach assets while the release is still a draft (immutable releases
          # freeze assets at publish time), then publish. A draft left over from a
          # re-run is still mutable, so upload --clobber into it before publishing.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS \
              --draft --verify-tag --title "$GITHUB_REF_NAME" --generate-notes
          fi
          gh release edit "$GITHUB_REF_NAME" --draft=false

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: binaries
    if: github.ref_type == 'tag'
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Capture build date
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
