name: Build binaries

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archives
        env:
          VERSION: ${{ github.event.release.tag_name || (github.ref_type == 'tag' && github.ref_name) || 'dev' }}
        run: make dist

      - name: Verify Linux archive
        env:
          VERSION: ${{ github.event.release.tag_name || (github.ref_type == 'tag' && github.ref_name) || 'dev' }}
        run: |
          tar -tzf "dist/cinc-zero_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "dist/cinc-zero_${VERSION}_linux_amd64.tar.gz" -C /tmp
          "/tmp/cinc-zero_${VERSION}_linux_amd64/cinc-zero" version

      - name: Publish GitHub release assets
        if: github.event_name == 'release' || github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS --verify-tag --title "$GITHUB_REF_NAME" --generate-notes
          fi

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: binaries
    if: github.event_name == 'release' || github.ref_type == 'tag'
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Capture build date
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ github.event.release.tag_name || github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event.release.tag_name || github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
