name: Build binaries

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archives
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: make dist

      - name: Verify Linux archive
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: |
          tar -tzf "dist/cinc-zero_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "dist/cinc-zero_${VERSION}_linux_amd64.tar.gz" -C /tmp
          "/tmp/cinc-zero_${VERSION}_linux_amd64/cinc-zero" version

      - name: Publish GitHub release assets
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/SHA256SUMS --verify-tag --title "$GITHUB_REF_NAME" --generate-notes
          fi
