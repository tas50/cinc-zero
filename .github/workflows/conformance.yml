name: Conformance

# Drives the real knife CLI (from Cinc Workstation) against an in-process
# cinc-zero server, validating end-to-end fidelity of signed requests, search,
# and the cookbook sandbox/upload flow.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  conformance:
    name: knife against cinc-zero
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Cinc Workstation
        run: curl -L https://omnitruck.cinc.sh/install.sh | sudo bash -s -- -P cinc-workstation -c stable

      - name: Locate knife
        run: |
          export PATH="/opt/cinc-workstation/bin:$PATH"
          knife --version
          echo "KNIFE=$(command -v knife)" >> "$GITHUB_ENV"

      - name: Run conformance suite
        run: go test -tags conformance ./conformance/ -v
